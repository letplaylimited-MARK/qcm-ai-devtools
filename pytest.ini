[pytest]
# 测试路径
testpaths = tests

# 测试文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 默认参数
addopts = 
    -v 
    --tb=short
    --strict-markers
    --cov=qcm_tools
    --cov-report=term-missing
    --cov-report=html:htmlcov

# 标记定义
markers =
    unit: 单元测试
    integration: 集成测试
    slow: 慢速测试

# 忽略警告
filterwarnings =
    ignore::DeprecationWarning
